
# Tiny Tapeout project information
project:
  title:        ""      # Project title
  author:       ""      # Your name
  discord:      ""      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  ""      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     25175000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_27jorge05_crc_fifo"
  
  # List your project's source files here. Source files must be in ./src and you must list each source file separately, one per line:
  source_files:
    - "project.v"
    - "hvsync_generator.v"
 
pinout:
  # Inputs
  ui[0]: "wr"
  ui[1]: "rd"
  ui[2]: "addr[0]"
  ui[3]: "addr[1]"
  ui[4]: "addr[2]"
  ui[5]: "addr[3]"
  ui[6]: "enable"
  ui[7]: "rst_crc"
  # Outputs — TinyVGA PMOD: {hsync, B[0], G[0], R[0], vsync, B[1], G[1], R[1]}
  uo[0]: "R1"
  uo[1]: "G1"
  uo[2]: "B1"
  uo[3]: "VSync"
  uo[4]: "R0"
  uo[5]: "G0"
  uo[6]: "B0"
  uo[7]: "HSync"
  # Bidirectional — data bus (write: byte to FIFO / read: register value)
  uio[0]: "data[0]"
  uio[1]: "data[1]"
  uio[2]: "data[2]"
  uio[3]: "data[3]"
  uio[4]: "data[4]"
  uio[5]: "data[5]"
  uio[6]: "data[6]"
  uio[7]: "data[7]"
 
# Do not change!
yaml_version: 6
